<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>khushaank.github.io/bloom - 404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9f8 0%, #f0f6f3 100%);
            color: #2d3436;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #4d7a52;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #2d3436;
        }
        
        .error-message {
            font-size: 16px;
            color: #636e72;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .error-btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary {
            background-color: #4d7a52;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #3d5f42;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(77, 122, 82, 0.2);
        }
        
        .btn-secondary {
            border: 2px solid #4d7a52;
            color: #4d7a52;
            background-color: transparent;
        }
        
        .btn-secondary:hover {
            background-color: #f0f6f3;
        }
        
        .logo {
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: 600;
            color: #4d7a52;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo">🌿 Bloom</div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            We couldn't find the page you're looking for. The page might have been moved or deleted.
            Don't worry, let's get you back on track with your finances.
        </p>
        <div class="error-actions">
            <a href="/" class="error-btn btn-primary">Return Home</a>
            <button onclick="history.back()" class="error-btn btn-secondary">Go Back</button>
        </div>
    </div>
</body>
</html>
